apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app-deployment
  labels:
    app: react-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: react-app
  template:
    metadata:
      labels:
        app: react-app
    spec:
      containers:
      - name: react-app
        image: rupeshyad27/react-app:BUILD_NUMBER
        ports:
        - containerPort: 3000 # Aligned with Dockerfile EXPOSE 3000
        resources:
          requests:
            memory: "32Mi"
            cpu: "100m"
          limits:
            memory: "64Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: react-app-service
spec:
  type: NodePort
  selector:
    app: react-app
  ports:
    - port: 80         # Internal cluster routing port
      targetPort: 3000 # Forwards incoming cluster traffic to the container's port 3000
      nodePort: 30007  # The port you type into your web browser