apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app
  namespace: default
  labels:
    app: react-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: react-app
  strategy:
    type: RollingUpdate          # zero-downtime rollouts
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: react-app
    spec:
      containers:
        - name: react-app
          image: rupeshyad27/react-app:latest   # Jenkins replaces 'latest' with the build tag
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          # ── Resource limits keep memory usage minimal ─────────────────
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          # ── Health checks ─────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
      # Pull from Docker Hub (public image — no secret needed)
      # If private, add: imagePullSecrets: [{name: dockerhub-secret}]
      #Deployment file